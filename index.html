<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nemotron Nano 9B V2 Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0b0f19;
      color: #e1e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 700px;
      width: 100%;
      background: #1a1f2e;
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }
    h1 {
      font-size: 1.8em;
      margin-bottom: 16px;
      color: #7aa2f7;
      text-align: center;
    }
    .api-section {
      background: #21283a;
      padding: 16px;
      border-radius: 14px;
      margin-bottom: 20px;
    }
    .api-section label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: #9aa5ce;
    }
    .api-row {
      display: flex;
      gap: 8px;
    }
    #apiKey {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #3a4058;
      border-radius: 10px;
      background: #131720;
      color: #e1e8f0;
      font-size: 0.95em;
    }
    #apiKey:focus {
      outline: none;
      border-color: #7aa2f7;
    }
    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
      background: #7aa2f7;
      color: #0b0f19;
      transition: all 0.2s;
    }
    .btn:hover {
      background: #89b4fa;
      transform: translateY(-1px);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: default;
      transform: none;
    }
    .btn-outline {
      background: transparent;
      border: 1px solid #7aa2f7;
      color: #7aa2f7;
    }
    .btn-outline:hover {
      background: #7aa2f720;
    }
    .info-text {
      font-size: 0.85em;
      color: #8a95b8;
      margin-top: 8px;
    }
    .chat-area {
      background: #131720;
      border-radius: 14px;
      padding: 20px;
      min-height: 300px;
      max-height: 500px;
      overflow-y: auto;
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 80%;
      padding: 10px 16px;
      border-radius: 16px;
      line-height: 1.5;
      font-size: 0.95em;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .message.user {
      align-self: flex-end;
      background: #7aa2f7;
      color: #0b0f19;
    }
    .message.assistant {
      align-self: flex-start;
      background: #21283a;
      color: #e1e8f0;
    }
    .message.system {
      align-self: center;
      background: #2d3348;
      color: #9aa5ce;
      font-style: italic;
      max-width: 100%;
      font-size: 0.85em;
    }
    .input-row {
      display: flex;
      gap: 8px;
    }
    #userInput {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #3a4058;
      border-radius: 14px;
      background: #131720;
      color: #e1e8f0;
      font-size: 1em;
      resize: none;
      height: 52px;
    }
    #userInput:focus {
      outline: none;
      border-color: #7aa2f7;
    }
    .status {
      font-size: 0.85em;
      color: #9aa5ce;
      margin-top: 6px;
    }
    .error {
      color: #f7768e;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ Nemotron Nano 9B V2 (free)</h1>

    <!-- APIキー設定エリア -->
    <div class="api-section">
      <label>🔑 OpenRouter APIキー</label>
      <div class="api-row">
        <input type="password" id="apiKey" placeholder="sk-or-v1-...">
        <button class="btn" id="connectBtn">接続</button>
      </div>
      <div class="info-text">
        <a href="https://openrouter.ai/keys" target="_blank" style="color:#7aa2f7;">OpenRouterでキーを取得</a>（無料枠あり）
      </div>
      <div id="connectionStatus" class="status"></div>
    </div>

    <!-- チャットエリア -->
    <div id="chatArea" class="chat-area">
      <div class="message system">APIキーを入力して「接続」を押してください。</div>
    </div>

    <div class="input-row">
      <input type="text" id="userInput" placeholder="メッセージを入力..." disabled>
      <button class="btn" id="sendBtn" disabled>送信</button>
    </div>
    <button class="btn btn-outline" id="clearChat" style="margin-top:10px; width:100%;">チャットをクリア</button>
    <div id="errorStatus" class="status error" style="margin-top:6px;"></div>
  </div>

  <script>
    (function() {
      const MODEL = "nvidia/nemotron-nano-9b-v2:free"; // 固定モデル
      const API_URL = "https://openrouter.ai/api/v1/chat/completions";

      // DOM
      const apiKeyInput = document.getElementById('apiKey');
      const connectBtn = document.getElementById('connectBtn');
      const connectionStatus = document.getElementById('connectionStatus');
      const chatArea = document.getElementById('chatArea');
      const userInput = document.getElementById('userInput');
      const sendBtn = document.getElementById('sendBtn');
      const clearChatBtn = document.getElementById('clearChat');
      const errorStatus = document.getElementById('errorStatus');

      // 状態
      let apiKey = localStorage.getItem('openrouter_api_key') || '';
      let messages = [];  // 会話履歴
      let isConnected = false;

      // 初期化
      if (apiKey) {
        apiKeyInput.value = apiKey;
        connect();
      }

      // イベントリスナー
      connectBtn.addEventListener('click', () => {
        apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
          showError("APIキーを入力してください。");
          return;
        }
        localStorage.setItem('openrouter_api_key', apiKey);
        connect();
      });

      sendBtn.addEventListener('click', sendMessage);
      userInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      clearChatBtn.addEventListener('click', () => {
        messages = [];
        renderMessages();
        errorStatus.textContent = '';
      });

      // 接続処理（キー検証は行わず、UIのみ有効化）
      function connect() {
        apiKey = apiKeyInput.value.trim();
        if (!apiKey) {
          showError("APIキーが空です。");
          return;
        }
        isConnected = true;
        connectionStatus.textContent = "✅ 接続準備完了";
        connectionStatus.style.color = '#9ece6a';
        userInput.disabled = false;
        sendBtn.disabled = false;
        errorStatus.textContent = '';
        // 初回メッセージを追加
        if (messages.length === 0) {
          addSystemMessage("Nemotron Nano 9B V2 に接続しました。話しかけてください。");
        }
      }

      // メッセージ送信
      async function sendMessage() {
        if (!isConnected || !apiKey) {
          showError("最初にAPIキーを設定してください。");
          return;
        }

        const content = userInput.value.trim();
        if (!content) return;

        // ユーザーメッセージ追加
        addMessage('user', content);
        messages.push({ role: 'user', content: content });
        userInput.value = '';
        userInput.focus();
        renderMessages();
        errorStatus.textContent = '';

        // 送信中UI
        sendBtn.disabled = true;
        userInput.disabled = true;
        const loadingMsgId = addSystemMessage("考え中...");

        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${apiKey}`,
              'Content-Type': 'application/json',
              'HTTP-Referer': window.location.origin, // OpenRouter推奨
              'X-Title': 'Nemotron Chat'
            },
            body: JSON.stringify({
              model: MODEL,
              messages: messages.slice(-20) // 直近20件でコンテキストを制限（必要に応じて調整）
            })
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            const errMsg = errData.error?.message || `HTTP ${response.status}`;
            throw new Error(errMsg);
          }

          const data = await response.json();
          const reply = data.choices?.[0]?.message?.content;
          if (!reply) throw new Error("応答が空です");

          // アシスタントメッセージ追加
          messages.push({ role: 'assistant', content: reply });
          removeSystemMessage(loadingMsgId);
          addMessage('assistant', reply);

        } catch (err) {
          removeSystemMessage(loadingMsgId);
          showError(`エラー: ${err.message}`);
          // 失敗したユーザーメッセージは残す（履歴から削除）
          messages.pop();
        } finally {
          sendBtn.disabled = false;
          userInput.disabled = false;
          renderMessages();
        }
      }

      // UI操作
      function addMessage(role, content) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.textContent = content;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
      }

      function addSystemMessage(text) {
        const div = document.createElement('div');
        div.className = 'message system';
        div.textContent = text;
        const id = Date.now();
        div.dataset.systemId = id;
        chatArea.appendChild(div);
        chatArea.scrollTop = chatArea.scrollHeight;
        return id;
      }

      function removeSystemMessage(id) {
        const el = chatArea.querySelector(`.message.system[data-system-id="${id}"]`);
        if (el) el.remove();
      }

      function renderMessages() {
        // チャットエリアを完全再描画（ただしシステムメッセージ以外は再構築）
        chatArea.innerHTML = '';
        messages.forEach(msg => {
          const div = document.createElement('div');
          div.className = `message ${msg.role}`;
          div.textContent = msg.content;
          chatArea.appendChild(div);
        });
        chatArea.scrollTop = chatArea.scrollHeight;
      }

      function showError(text) {
        errorStatus.textContent = text;
      }
    })();
  </script>
</body>
</html>
