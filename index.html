<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIチャット - APIキーで起動</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .container {
            width: 100%;
            max-width: 720px;
            background: #1e293b;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            font-size: 2rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            margin-bottom: 2rem;
            color: #94a3b8;
        }
        .setup-panel {
            background: #0f172a;
            border-radius: 1rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .setup-panel h2 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .api-links {
            background: #1e293b;
            border-radius: 0.75rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }
        .api-links p {
            margin-bottom: 0.75rem;
            font-weight: 500;
        }
        .api-links a {
            display: inline-block;
            margin: 0.25rem 0.5rem 0.25rem 0;
            padding: 0.5rem 1rem;
            background: #334155;
            color: #38bdf8;
            text-decoration: none;
            border-radius: 0.5rem;
            font-weight: 500;
            transition: background 0.2s;
        }
        .api-links a:hover {
            background: #475569;
        }
        .key-input-group {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .key-input-group input {
            flex: 1;
            min-width: 200px;
            padding: 0.75rem 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            color: #e2e8f0;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }
        .key-input-group input:focus {
            border-color: #38bdf8;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .btn:hover {
            background: #2563eb;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #475569;
            color: #cbd5e1;
        }
        .btn-outline:hover {
            background: #1e293b;
        }
        .chat-panel {
            display: none;
            flex-direction: column;
            height: 60vh;
            min-height: 400px;
        }
        .chat-panel.active {
            display: flex;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            background: #0f172a;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            max-width: 80%;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            line-height: 1.5;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
            background: #3b82f6;
            color: white;
            border-bottom-right-radius: 0.25rem;
        }
        .message.assistant {
            align-self: flex-start;
            background: #1e293b;
            border: 1px solid #334155;
            border-bottom-left-radius: 0.25rem;
        }
        .message.error {
            align-self: center;
            background: #7f1d1d;
            color: #fca5a5;
            max-width: 90%;
        }
        .chat-input-area {
            display: flex;
            gap: 0.75rem;
        }
        .chat-input-area input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            color: #e2e8f0;
            font-size: 1rem;
            outline: none;
        }
        .chat-input-area input:focus {
            border-color: #38bdf8;
        }
        .status {
            font-size: 0.85rem;
            margin-top: 0.5rem;
            color: #94a3b8;
            text-align: center;
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 480px) {
            .container { padding: 1.5rem; }
            .key-input-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AIチャット</h1>
        <p class="subtitle">自分のAPIキーでAIを起動しよう</p>

        <!-- セットアップエリア -->
        <div id="setupPanel" class="setup-panel">
            <h2>🔑 APIキーを取得する</h2>
            <div class="api-links">
                <p>以下のサービスでAPIキーを発行できます（OpenAI推奨）</p>
                <a href="https://platform.openai.com/api-keys" target="_blank" rel="noopener">
                    OpenAI API Keys ↗
                </a>
                <a href="https://platform.openai.com/signup" target="_blank" rel="noopener">
                    アカウント作成 ↗
                </a>
            </div>
            <div class="key-input-group">
                <input type="password" id="apiKeyInput" placeholder="sk-... あなたのAPIキーを貼り付け">
                <button class="btn" id="activateBtn">
                    <span>⚡</span> 起動する
                </button>
            </div>
            <p class="status" id="setupStatus"></p>
        </div>

        <!-- チャットエリア（初期非表示） -->
        <div id="chatPanel" class="chat-panel">
            <div class="chat-messages" id="chatMessages">
                <div class="message assistant">
                    👋 こんにちは！APIキーが有効になりました。何でも質問してください。
                </div>
            </div>
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="メッセージを入力... (Enterで送信)">
                <button class="btn" id="sendBtn">
                    <span>📤</span> 送信
                </button>
                <button class="btn btn-outline" id="resetKeyBtn">
                    🔄 キー解除
                </button>
            </div>
            <p class="status" id="chatStatus"></p>
        </div>
    </div>

    <script>
        (function() {
            // DOM elements
            const setupPanel = document.getElementById('setupPanel');
            const chatPanel = document.getElementById('chatPanel');
            const apiKeyInput = document.getElementById('apiKeyInput');
            const activateBtn = document.getElementById('activateBtn');
            const setupStatus = document.getElementById('setupStatus');
            const chatMessages = document.getElementById('chatMessages');
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const resetKeyBtn = document.getElementById('resetKeyBtn');
            const chatStatus = document.getElementById('chatStatus');

            // State
            let apiKey = localStorage.getItem('openai_api_key') || '';
            let isWaitingForResponse = false;

            // Initialize: if key exists, go directly to chat
            if (apiKey) {
                showChatPanel();
            }

            // Event listeners
            activateBtn.addEventListener('click', handleActivate);
            apiKeyInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleActivate();
            });
            sendBtn.addEventListener('click', handleSendMessage);
            userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage();
                }
            });
            resetKeyBtn.addEventListener('click', handleResetKey);

            function handleActivate() {
                const key = apiKeyInput.value.trim();
                if (!key) {
                    setupStatus.textContent = '⚠️ APIキーを入力してください。';
                    return;
                }
                if (!key.startsWith('sk-')) {
                    setupStatus.textContent = '⚠️ 有効なOpenAI APIキーではありません（sk- で始まる必要があります）。';
                    return;
                }
                // Save key
                apiKey = key;
                localStorage.setItem('openai_api_key', apiKey);
                apiKeyInput.value = '';
                setupStatus.textContent = '';
                showChatPanel();
            }

            function showChatPanel() {
                setupPanel.classList.add('hidden');
                chatPanel.classList.add('active');
                // Ensure welcome message is shown if chat is empty
                if (chatMessages.children.length === 0) {
                    addMessage('assistant', '👋 こんにちは！APIキーが有効になりました。何でも質問してください。');
                }
                userInput.focus();
            }

            function handleResetKey() {
                if (isWaitingForResponse) {
                    chatStatus.textContent = '応答待ちのためキーを解除できません。しばらくお待ちください。';
                    return;
                }
                if (confirm('APIキーを削除し、入力画面に戻りますか？')) {
                    localStorage.removeItem('openai_api_key');
                    apiKey = '';
                    chatMessages.innerHTML = '';
                    chatPanel.classList.remove('active');
                    setupPanel.classList.remove('hidden');
                    setupStatus.textContent = '';
                }
            }

            async function handleSendMessage() {
                const message = userInput.value.trim();
                if (!message || isWaitingForResponse) return;
                if (!apiKey) {
                    chatStatus.textContent = 'APIキーが設定されていません。再読み込みしてください。';
                    return;
                }

                // Add user message
                addMessage('user', message);
                userInput.value = '';
                chatStatus.textContent = '考え中...';
                isWaitingForResponse = true;
                sendBtn.disabled = true;

                try {
                    const response = await callOpenAI(apiKey, message);
                    addMessage('assistant', response);
                    chatStatus.textContent = '';
                } catch (error) {
                    console.error(error);
                    addMessage('error', `⚠️ エラー: ${error.message}`);
                    chatStatus.textContent = 'エラーが発生しました。APIキーやネットワークを確認してください。';
                } finally {
                    isWaitingForResponse = false;
                    sendBtn.disabled = false;
                    userInput.focus();
                }
            }

            async function callOpenAI(key, userMessage) {
                const url = 'https://api.openai.com/v1/chat/completions';
                const payload = {
                    model: 'gpt-3.5-turbo', // 低コスト＆高速。必要に応じて変更可
                    messages: [
                        { role: 'system', content: 'あなたは親切なアシスタントです。日本語で簡潔に回答してください。' },
                        { role: 'user', content: userMessage }
                    ],
                    temperature: 0.7,
                    max_tokens: 1000
                };

                const res = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${key}`
                    },
                    body: JSON.stringify(payload)
                });

                if (!res.ok) {
                    const errorData = await res.json().catch(() => ({}));
                    const errorMsg = errorData.error?.message || `HTTP ${res.status}`;
                    throw new Error(errorMsg);
                }

                const data = await res.json();
                return data.choices[0].message.content.trim();
            }

            function addMessage(role, content) {
                const div = document.createElement('div');
                div.className = `message ${role}`;
                div.textContent = content;
                chatMessages.appendChild(div);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        })();
    </script>
</body>
</html>
